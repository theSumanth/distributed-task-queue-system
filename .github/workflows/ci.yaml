name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Build App
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t distributed-task-queue-api .

      - name: Build Worker image
        if: hashFiles('src/worker.ts') != ''
        run: docker build -t distributed-task-queue-worker -f Dockerfile.worker .
