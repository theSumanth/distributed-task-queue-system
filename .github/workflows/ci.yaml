name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npm run typecheck

  build:
    name: Build App
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build unified image
        run: docker build -t task-queue-app .

  integration-test:
    name: Integration Test (API + DB + Redis)
    runs-on: ubuntu-latest
    needs: docker-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: task_queue
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-queue-app .

      - name: Run migrations
        run: |
          docker run --network host \
            -e NODE_ENV=development \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=task_queue \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_SSL_ENABLED=false \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e REDIS_TLS_ENABLED=false \
            task-queue-app node dist/database/migrate.cjs up

      - name: Start API container
        run: |
          docker run -d --network host \
            -e NODE_ENV=development \
            -e PORT=8080 \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=task_queue \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_SSL_ENABLED=false \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e REDIS_TLS_ENABLED=false \
            task-queue-app

          sleep 5

      - name: Health checks
        run: |
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/health/detailed
