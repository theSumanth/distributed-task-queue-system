name: CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          echo "Tag detected: ${GITHUB_REF}"
          if [[ ! "${GITHUB_REF}" =~ refs/tags/v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid tag format. Use vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Deploy API (Render)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK is not set"
            exit 1
          fi

          echo "Deploying API to Render..."
          curl -f -X POST "$RENDER_DEPLOY_HOOK"

      - name: Deployment Summary
        run: |
          echo "API deployed via tag"
          echo "Workers deploy automatically via Railway on main branch"
