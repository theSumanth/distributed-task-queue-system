services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_queue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: task-queue-app
    command: ['node', 'dist/index.cjs']
    env_file:
      - .env.development
    ports:
      - '8080:8080'
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  migrate:
    image: task-queue-app
    command: ['node', 'dist/database/migrate.cjs', 'up']
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy

  outbox-worker:
    image: task-queue-app
    command: ['node', 'dist/workers/outbox.worker.cjs']
    env_file:
      - .env.development
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
